apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: checkout-microservice
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/HimanshuSarma/argocd1.git
    targetRevision: HEAD
    path: k8s/platform-stack/microservices/checkout
  ignoreDifferences:
  - group: ""
    kind: Service
    jsonPointers:
    - /spec/selector/rollouts-pod-template-hash
    managedFieldsManagers:
    - argo-rollouts
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # - ServerSideApply=true