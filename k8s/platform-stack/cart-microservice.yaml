apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cart-microservice
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/HimanshuSarma/ecommerce-app-k8s.git
    targetRevision: HEAD
    path: k8s/platform-stack/microservices/cart
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # - ServerSideApply=true